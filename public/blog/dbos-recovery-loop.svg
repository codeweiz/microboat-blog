<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 690" role="img" aria-labelledby="t d">
  <title id="t">DBOS recovery loop on Postgres</title>
  <desc id="d">Two Postgres tables and a per-step recovery decision: return the checkpointed output if present, otherwise execute the step and write its row.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#070C16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B2942"/><stop offset="1" stop-color="#0E1828"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#38BDF8"/>
    </marker>
    <marker id="arG" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#34D399"/>
    </marker>
    <marker id="arA" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#FBBF24"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#1E293B" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1320" height="690" fill="url(#bg)"/>
  <rect width="1320" height="690" fill="url(#grid)"/>

  <g font-family="Inter, system-ui, sans-serif">
    <text x="660" y="50" fill="#F8FAFC" font-size="29" font-weight="700" text-anchor="middle">Exactly-once, expressed as two Postgres tables</text>
    <line x1="582" y1="66" x2="738" y2="66" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
    <text x="660" y="94" fill="#94A3B8" font-size="15" text-anchor="middle">Recovery is a per-step lookup against operation_outputs, keyed by workflow and step number.</text>

    <!-- tables -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">
      <g filter="url(#sh)"><rect x="70" y="124" width="548" height="150" rx="12" fill="url(#card)" stroke="#1E3A5F"/></g>
      <g transform="translate(70 124)">
        <rect x="0" y="0" width="548" height="6" rx="3" fill="#38BDF8" opacity="0.85"/>
        <text x="24" y="40" fill="#FFFFFF" font-size="16" font-weight="700" font-family="Inter, system-ui, sans-serif">workflow_status</text>
        <line x1="24" y1="54" x2="524" y2="54" stroke="#1E3A5F"/>
        <text x="24" y="82" fill="#7DD3FC" font-size="13.5">workflow_uuid    PRIMARY KEY</text>
        <text x="24" y="106" fill="#E2E8F0" font-size="13.5">status           PENDING / SUCCESS / ERROR</text>
        <text x="24" y="130" fill="#E2E8F0" font-size="13.5">output, error    final result</text>
      </g>

      <g filter="url(#sh)"><rect x="702" y="124" width="548" height="150" rx="12" fill="url(#card)" stroke="#1E3A5F"/></g>
      <g transform="translate(702 124)">
        <rect x="0" y="0" width="548" height="6" rx="3" fill="#FBBF24" opacity="0.85"/>
        <text x="24" y="40" fill="#FFFFFF" font-size="16" font-weight="700" font-family="Inter, system-ui, sans-serif">operation_outputs</text>
        <line x1="24" y1="54" x2="524" y2="54" stroke="#3A2E12"/>
        <text x="24" y="82" fill="#FCD34D" font-size="13">(workflow_uuid, function_id)  PRIMARY KEY</text>
        <text x="24" y="106" fill="#E2E8F0" font-size="13.5">function_name</text>
        <text x="24" y="130" fill="#E2E8F0" font-size="13.5">output, error    this step's checkpoint</text>
      </g>
    </g>

    <!-- flow row -->
    <g transform="translate(0 322)">
      <g filter="url(#sh)"><rect x="70" y="0" width="286" height="66" rx="12" fill="#0EA5E9" fill-opacity="0.12" stroke="#38BDF8" stroke-opacity="0.55"/></g>
      <text x="213" y="29" fill="#F8FAFC" font-size="14.5" font-weight="700" text-anchor="middle">Recover the workflow</text>
      <text x="213" y="49" fill="#CBD5E1" font-size="12.5" text-anchor="middle">re-call it with its checkpointed input</text>

      <line x1="356" y1="33" x2="416" y2="33" stroke="#38BDF8" stroke-width="2.5" marker-end="url(#ar)"/>

      <g filter="url(#sh)"><rect x="418" y="0" width="210" height="66" rx="12" fill="url(#card)" stroke="#1E3A5F"/></g>
      <text x="523" y="29" fill="#F8FAFC" font-size="14.5" font-weight="700" text-anchor="middle">For each step i</text>
      <text x="523" y="49" fill="#CBD5E1" font-size="12.5" text-anchor="middle">as the code re-executes</text>

      <line x1="628" y1="33" x2="688" y2="33" stroke="#38BDF8" stroke-width="2.5" marker-end="url(#ar)"/>

      <g filter="url(#sh)">
        <polygon points="840,-14 980,33 840,80 700,33" fill="#0E1828" stroke="#22D3EE" stroke-opacity="0.55"/>
      </g>
      <text x="840" y="30" fill="#F8FAFC" font-size="13" font-weight="700" text-anchor="middle">Row for (uuid, i)</text>
      <text x="840" y="49" fill="#F8FAFC" font-size="13" font-weight="700" text-anchor="middle">already present?</text>
    </g>

    <!-- hit -->
    <g transform="translate(0 322)">
      <line x1="840" y1="80" x2="840" y2="132" stroke="#34D399" stroke-width="2.5" marker-end="url(#arG)"/>
      <text x="858" y="112" fill="#34D399" font-size="13" font-weight="700">hit</text>
      <g filter="url(#sh)"><rect x="678" y="134" width="324" height="74" rx="12" fill="#34D399" fill-opacity="0.10" stroke="#34D399" stroke-opacity="0.5"/></g>
      <text x="840" y="164" fill="#ECFDF5" font-size="14.5" font-weight="700" text-anchor="middle">Return the stored output</text>
      <text x="840" y="187" fill="#A7F3D0" font-size="12.5" text-anchor="middle">skip execution, the side effect never repeats</text>
    </g>

    <!-- miss -->
    <g transform="translate(0 322)">
      <line x1="980" y1="33" x2="1058" y2="33" stroke="#FBBF24" stroke-width="2.5" marker-end="url(#arA)"/>
      <text x="1008" y="22" fill="#FBBF24" font-size="13" font-weight="700">miss</text>
      <g filter="url(#sh)"><rect x="1060" y="-6" width="190" height="78" rx="12" fill="#FBBF24" fill-opacity="0.10" stroke="#FBBF24" stroke-opacity="0.5"/></g>
      <text x="1155" y="22" fill="#FEF3C7" font-size="13.5" font-weight="700" text-anchor="middle">Execute the step</text>
      <text x="1155" y="44" fill="#FDE68A" font-size="12.5" text-anchor="middle">then INSERT its</text>
      <text x="1155" y="62" fill="#FDE68A" font-size="12.5" text-anchor="middle">output as a new row</text>
    </g>

    <!-- queue note -->
    <g transform="translate(70 612)" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
      <rect x="0" y="0" width="1180" height="50" rx="12" fill="#0A1120" stroke="#1E3A5F"/>
      <text x="22" y="31" fill="#CBD5E1" font-size="13.5">Queue:  SELECT &#8230; FOR UPDATE SKIP LOCKED  &#8212;  one worker claims each task; duplicate checkpoints collide on the primary key.</text>
    </g>
  </g>
</svg>
