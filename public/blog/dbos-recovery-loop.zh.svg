<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 690" role="img" aria-labelledby="t d">
  <title id="t">DBOS 在 Postgres 上的恢复循环</title>
  <desc id="d">两张 Postgres 表，以及逐步恢复的判定：命中就返回 checkpoint，未命中就执行并写入这一行。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#070C16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C2348"/><stop offset="1" stop-color="#0E1428"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#818CF8"/>
    </marker>
    <marker id="arT" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2DD4BF"/>
    </marker>
    <marker id="arR" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#FB7185"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#1E293B" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1320" height="690" fill="url(#bg)"/>
  <rect width="1320" height="690" fill="url(#grid)"/>

  <g font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Inter,system-ui,sans-serif">
    <text x="660" y="50" fill="#F8FAFC" font-size="29" font-weight="700" text-anchor="middle">恰好一次，落成两张 Postgres 表</text>
    <line x1="588" y1="66" x2="732" y2="66" stroke="#818CF8" stroke-width="3" stroke-linecap="round"/>
    <text x="660" y="94" fill="#94A3B8" font-size="15" text-anchor="middle">恢复就是按工作流和步骤号，对 operation_outputs 做一次逐步查表。</text>

    <g>
      <g filter="url(#sh)"><rect x="70" y="124" width="548" height="150" rx="12" fill="url(#card)" stroke="#33356B"/></g>
      <g transform="translate(70 124)">
        <rect x="0" y="0" width="548" height="6" rx="3" fill="#818CF8" opacity="0.85"/>
        <text x="24" y="40" fill="#FFFFFF" font-size="16" font-weight="700">workflow_status</text>
        <line x1="24" y1="54" x2="524" y2="54" stroke="#33356B"/>
        <g font-family="ui-monospace,Menlo,monospace">
          <text x="24" y="82" fill="#A5B4FC" font-size="13.5">workflow_uuid    PRIMARY KEY</text>
          <text x="24" y="106" fill="#E2E8F0" font-size="13.5">status           PENDING / SUCCESS / ERROR</text>
          <text x="24" y="130" fill="#E2E8F0" font-size="13.5">output, error    最终结果</text>
        </g>
      </g>

      <g filter="url(#sh)"><rect x="702" y="124" width="548" height="150" rx="12" fill="url(#card)" stroke="#134E4A"/></g>
      <g transform="translate(702 124)">
        <rect x="0" y="0" width="548" height="6" rx="3" fill="#2DD4BF" opacity="0.85"/>
        <text x="24" y="40" fill="#FFFFFF" font-size="16" font-weight="700">operation_outputs</text>
        <line x1="24" y1="54" x2="524" y2="54" stroke="#134E4A"/>
        <g font-family="ui-monospace,Menlo,monospace">
          <text x="24" y="82" fill="#5EEAD4" font-size="13">(workflow_uuid, function_id)  PRIMARY KEY</text>
          <text x="24" y="106" fill="#E2E8F0" font-size="13.5">function_name</text>
          <text x="24" y="130" fill="#E2E8F0" font-size="13.5">output, error    这一步的 checkpoint</text>
        </g>
      </g>
    </g>

    <g transform="translate(0 322)">
      <g filter="url(#sh)"><rect x="70" y="0" width="286" height="66" rx="12" fill="#818CF8" fill-opacity="0.12" stroke="#818CF8" stroke-opacity="0.55"/></g>
      <text x="213" y="29" fill="#F8FAFC" font-size="14.5" font-weight="700" text-anchor="middle">恢复这个工作流</text>
      <text x="213" y="49" fill="#CBD5E1" font-size="12.5" text-anchor="middle">用它的 checkpoint 输入重新调用</text>

      <line x1="356" y1="33" x2="416" y2="33" stroke="#818CF8" stroke-width="2.5" marker-end="url(#ar)"/>

      <g filter="url(#sh)"><rect x="418" y="0" width="210" height="66" rx="12" fill="url(#card)" stroke="#33356B"/></g>
      <text x="523" y="29" fill="#F8FAFC" font-size="14.5" font-weight="700" text-anchor="middle">对每一步 i</text>
      <text x="523" y="49" fill="#CBD5E1" font-size="12.5" text-anchor="middle">在代码重跑过程中</text>

      <line x1="628" y1="33" x2="688" y2="33" stroke="#818CF8" stroke-width="2.5" marker-end="url(#ar)"/>

      <g filter="url(#sh)">
        <polygon points="840,-14 980,33 840,80 700,33" fill="#0E1428" stroke="#5EEAD4" stroke-opacity="0.55"/>
      </g>
      <text x="840" y="30" fill="#F8FAFC" font-size="13" font-weight="700" text-anchor="middle">(uuid, i) 这行</text>
      <text x="840" y="49" fill="#F8FAFC" font-size="13" font-weight="700" text-anchor="middle">是否已存在？</text>
    </g>

    <g transform="translate(0 322)">
      <line x1="840" y1="80" x2="840" y2="132" stroke="#2DD4BF" stroke-width="2.5" marker-end="url(#arT)"/>
      <text x="858" y="112" fill="#2DD4BF" font-size="13" font-weight="700">命中</text>
      <g filter="url(#sh)"><rect x="678" y="134" width="324" height="74" rx="12" fill="#2DD4BF" fill-opacity="0.10" stroke="#2DD4BF" stroke-opacity="0.5"/></g>
      <text x="840" y="164" fill="#CCFBF1" font-size="14.5" font-weight="700" text-anchor="middle">返回存好的输出</text>
      <text x="840" y="187" fill="#99F6E4" font-size="12.5" text-anchor="middle">跳过执行，副作用不再重复</text>
    </g>

    <g transform="translate(0 322)">
      <line x1="980" y1="33" x2="1058" y2="33" stroke="#FB7185" stroke-width="2.5" marker-end="url(#arR)"/>
      <text x="1008" y="22" fill="#FB7185" font-size="13" font-weight="700">未命中</text>
      <g filter="url(#sh)"><rect x="1060" y="-6" width="190" height="78" rx="12" fill="#FB7185" fill-opacity="0.10" stroke="#FB7185" stroke-opacity="0.5"/></g>
      <text x="1155" y="22" fill="#FFE4E6" font-size="13.5" font-weight="700" text-anchor="middle">执行这一步</text>
      <text x="1155" y="44" fill="#FECDD3" font-size="12.5" text-anchor="middle">然后把它的输出</text>
      <text x="1155" y="62" fill="#FECDD3" font-size="12.5" text-anchor="middle">INSERT 成新的一行</text>
    </g>

    <g transform="translate(70 612)">
      <rect x="0" y="0" width="1180" height="50" rx="12" fill="#0A1020" stroke="#33356B"/>
      <text x="22" y="31" fill="#CBD5E1" font-size="13.5" font-family="ui-monospace,Menlo,monospace">队列：SELECT &#8230; FOR UPDATE SKIP LOCKED  &#8212;  每个任务只被一个 worker 领走；重复 checkpoint 在主键上相撞。</text>
    </g>
  </g>
</svg>
