<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid slice">
  <title id="title">Time Compression</title>
  <desc id="desc">Abstract editorial illustration of vertically stacked translucent silicon layers with cyan and teal data streams flowing downward and compressing through the stack.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="layerFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E293B" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0.55"/>
    </linearGradient>

    <linearGradient id="cyanStream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#67E8F9" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#0EA5E9" stop-opacity="0.85"/>
      <stop offset="0.92" stop-color="#0EA5E9" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="warmStream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#FBBF24" stop-opacity="0.6"/>
      <stop offset="0.7" stop-color="#F59E0B" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="ambientGlow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#0EA5E9" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-10%" width="160%" height="120%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dots" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="0.9" fill="#334155" opacity="0.42"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>
  <ellipse cx="800" cy="500" rx="780" ry="380" fill="url(#ambientGlow)"/>

  <g opacity="0.94">
    <rect x="160" y="220" width="1280" height="62" rx="3" fill="url(#layerFill)" stroke="#0EA5E9" stroke-opacity="0.28"/>
    <line x1="160" y1="220" x2="1440" y2="220" stroke="#22D3EE" stroke-opacity="0.42" stroke-width="1.2"/>

    <rect x="210" y="338" width="1180" height="56" rx="3" fill="url(#layerFill)" stroke="#0EA5E9" stroke-opacity="0.32"/>
    <line x1="210" y1="338" x2="1390" y2="338" stroke="#22D3EE" stroke-opacity="0.48" stroke-width="1.2"/>

    <rect x="260" y="446" width="1080" height="50" rx="3" fill="url(#layerFill)" stroke="#0EA5E9" stroke-opacity="0.38"/>
    <line x1="260" y1="446" x2="1340" y2="446" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="1.2"/>

    <rect x="310" y="544" width="980" height="44" rx="3" fill="url(#layerFill)" stroke="#0EA5E9" stroke-opacity="0.44"/>
    <line x1="310" y1="544" x2="1290" y2="544" stroke="#22D3EE" stroke-opacity="0.62" stroke-width="1.2"/>

    <rect x="360" y="632" width="880" height="38" rx="3" fill="url(#layerFill)" stroke="#0EA5E9" stroke-opacity="0.50"/>
    <line x1="360" y1="632" x2="1240" y2="632" stroke="#22D3EE" stroke-opacity="0.70" stroke-width="1.2"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M 360 -10 Q 400 200 500 360 Q 600 520 660 700 L 680 920" stroke="url(#cyanStream)" stroke-width="2.4" fill="none" opacity="0.85"/>
    <path d="M 560 -10 Q 600 220 660 380 Q 720 540 760 720 L 780 920" stroke="url(#cyanStream)" stroke-width="2" fill="none" opacity="0.78"/>
    <path d="M 800 -10 L 800 920" stroke="url(#warmStream)" stroke-width="2.6" fill="none" opacity="0.92"/>
    <path d="M 1040 -10 Q 1000 220 940 380 Q 880 540 840 720 L 820 920" stroke="url(#cyanStream)" stroke-width="2" fill="none" opacity="0.78"/>
    <path d="M 1240 -10 Q 1200 200 1100 360 Q 1000 520 940 700 L 920 920" stroke="url(#cyanStream)" stroke-width="2.4" fill="none" opacity="0.85"/>
  </g>

  <g filter="url(#dotGlow)">
    <circle cx="500" cy="252" r="2.6" fill="#A5F3FC" opacity="0.92"/>
    <circle cx="660" cy="368" r="2.4" fill="#A5F3FC" opacity="0.88"/>
    <circle cx="800" cy="368" r="3.4" fill="#FDE68A" opacity="0.95"/>
    <circle cx="940" cy="368" r="2.4" fill="#A5F3FC" opacity="0.88"/>
    <circle cx="1100" cy="252" r="2.6" fill="#A5F3FC" opacity="0.92"/>
    <circle cx="800" cy="566" r="3" fill="#FDE68A" opacity="0.85"/>
    <circle cx="800" cy="652" r="4" fill="#FBBF24" opacity="0.92"/>
  </g>

  <g opacity="0.5">
    <line x1="0" y1="220" x2="160" y2="220" stroke="#0EA5E9" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="1440" y1="220" x2="1600" y2="220" stroke="#0EA5E9" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="0" y1="632" x2="360" y2="632" stroke="#0EA5E9" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="1240" y1="632" x2="1600" y2="632" stroke="#0EA5E9" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="2 4"/>
  </g>
</svg>
