<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 736" role="img" aria-labelledby="t d">
  <title id="t">Two models of durable execution</title>
  <desc id="d">Deterministic replay versus step-output checkpointing: both re-run code after a crash but store different things.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#070C16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B2942"/><stop offset="1" stop-color="#0E1828"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1120"/><stop offset="1" stop-color="#0B1322"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#1E293B" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1320" height="736" fill="url(#bg)"/>
  <rect width="1320" height="736" fill="url(#grid)"/>

  <g font-family="Inter, system-ui, sans-serif">
    <text x="660" y="52" fill="#F8FAFC" font-size="29" font-weight="700" text-anchor="middle">Two ways to make a program durable</text>
    <line x1="582" y1="68" x2="738" y2="68" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
    <text x="660" y="96" fill="#94A3B8" font-size="15" text-anchor="middle">After a crash both re-run the code from the top. What they persist differs.</text>

    <!-- LEFT: deterministic replay (cyan) -->
    <g filter="url(#sh)"><rect x="44" y="120" width="592" height="540" rx="16" fill="url(#card)" stroke="#1E3A5F"/></g>
    <g transform="translate(44 120)">
      <rect x="0" y="0" width="592" height="6" rx="3" fill="#38BDF8" opacity="0.9"/>
      <circle cx="34" cy="46" r="6" fill="#38BDF8"/>
      <text x="52" y="52" fill="#FFFFFF" font-size="21" font-weight="700">Deterministic replay</text>
      <text x="34" y="80" fill="#7DD3FC" font-size="13">Temporal &#183; Cadence &#183; Azure Durable Functions</text>
      <line x1="34" y1="98" x2="558" y2="98" stroke="#1E3A5F"/>

      <text x="34" y="130" fill="#CBD5E1" font-size="14" font-weight="600">Persisted &#8212; an append-only event history</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">
        <rect x="34" y="142" width="524" height="160" rx="9" fill="url(#inner)" stroke="#22D3EE" stroke-opacity="0.25"/>
        <text x="54" y="170" fill="#64748B" font-size="13">event_history &#8212; source of truth</text>
        <text x="54" y="200" fill="#E2E8F0" font-size="13.5">1  WorkflowStarted(input)</text>
        <text x="54" y="226" fill="#E2E8F0" font-size="13.5">2  ActivityScheduled: charge_card</text>
        <text x="54" y="252" fill="#E2E8F0" font-size="13.5">3  ActivityCompleted: ok</text>
        <text x="54" y="278" fill="#E2E8F0" font-size="13.5">4  TimerStarted: 5m</text>
      </g>

      <text x="34" y="340" fill="#CBD5E1" font-size="14" font-weight="600">On restart</text>
      <text x="34" y="366" fill="#F1F5F9" font-size="14.5">Re-run from line 1, feed each recorded</text>
      <text x="34" y="388" fill="#F1F5F9" font-size="14.5">result back in order, skip every activity</text>
      <text x="34" y="410" fill="#F1F5F9" font-size="14.5">already on the history.</text>

      <rect x="34" y="436" width="524" height="78" rx="10" fill="#0EA5E9" fill-opacity="0.08" stroke="#38BDF8" stroke-opacity="0.4"/>
      <text x="54" y="464" fill="#7DD3FC" font-size="13" font-weight="700" letter-spacing="0.5">CONSTRAINT</text>
      <text x="54" y="488" fill="#F1F5F9" font-size="14">Workflow code must be deterministic:</text>
      <text x="54" y="507" fill="#F1F5F9" font-size="14">no wall clock, no random, no direct I/O.</text>
    </g>

    <!-- RIGHT: checkpointing (amber) -->
    <g filter="url(#sh)"><rect x="684" y="120" width="592" height="540" rx="16" fill="url(#card)" stroke="#3A2E12"/></g>
    <g transform="translate(684 120)">
      <rect x="0" y="0" width="592" height="6" rx="3" fill="#FBBF24" opacity="0.9"/>
      <circle cx="34" cy="46" r="6" fill="#FBBF24"/>
      <text x="52" y="52" fill="#FFFFFF" font-size="21" font-weight="700">Step-output checkpointing</text>
      <text x="34" y="80" fill="#FCD34D" font-size="13">DBOS Transact &#8212; a library, no orchestrator</text>
      <line x1="34" y1="98" x2="558" y2="98" stroke="#3A2E12"/>

      <text x="34" y="130" fill="#CBD5E1" font-size="14" font-weight="600">Persisted &#8212; one row per completed step</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">
        <rect x="34" y="142" width="524" height="160" rx="9" fill="url(#inner)" stroke="#FBBF24" stroke-opacity="0.22"/>
        <text x="54" y="170" fill="#64748B" font-size="13">operation_outputs in your Postgres</text>
        <text x="54" y="196" fill="#64748B" font-size="12.5">(workflow_uuid, function_id) &#8594; output</text>
        <text x="54" y="226" fill="#E2E8F0" font-size="13.5">(w1, 0)  &#8594;  charge_card: ok</text>
        <text x="54" y="252" fill="#E2E8F0" font-size="13.5">(w1, 1)  &#8594;  send_email: sent</text>
        <text x="54" y="278" fill="#475569" font-size="13.5">(w1, 2)  &#8594;  &#8212;  not yet run</text>
      </g>

      <text x="34" y="340" fill="#CBD5E1" font-size="14" font-weight="600">On restart</text>
      <text x="34" y="366" fill="#F1F5F9" font-size="14.5">Re-run from the top; before each step</text>
      <text x="34" y="388" fill="#F1F5F9" font-size="14.5">look up its checkpoint, return the stored</text>
      <text x="34" y="410" fill="#F1F5F9" font-size="14.5">output and skip the side effect.</text>

      <rect x="34" y="436" width="524" height="78" rx="10" fill="#FBBF24" fill-opacity="0.08" stroke="#FBBF24" stroke-opacity="0.4"/>
      <text x="54" y="464" fill="#FCD34D" font-size="13" font-weight="700" letter-spacing="0.5">PROPERTY</text>
      <text x="54" y="488" fill="#F1F5F9" font-size="14">A step's checkpoint and the business write</text>
      <text x="54" y="507" fill="#F1F5F9" font-size="14">it makes commit in one transaction.</text>
    </g>

    <text x="660" y="700" fill="#64748B" font-size="14.5" text-anchor="middle">Same recovery shape, different durable record: a stream of events, or one row per finished step.</text>
  </g>
</svg>
