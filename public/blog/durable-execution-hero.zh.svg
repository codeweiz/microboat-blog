<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">持久化执行</title>
  <desc id="d">一条执行时间线，已完成的步骤把 checkpoint 落进底部的持久化存储，崩溃后从存储里重放恢复。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#05080F"/>
    </linearGradient>
    <linearGradient id="store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2340" stop-opacity="0.95"/><stop offset="1" stop-color="#0A1022" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#818CF8" stop-opacity="1"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.42" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#818CF8" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1E293B" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <ellipse cx="700" cy="400" rx="860" ry="420" fill="url(#halo)"/>

  <g filter="url(#shadow)">
    <rect x="150" y="690" width="1300" height="86" rx="14" fill="url(#store)" stroke="#2DD4BF" stroke-opacity="0.3"/>
  </g>
  <line x1="150" y1="690" x2="1450" y2="690" stroke="#2DD4BF" stroke-opacity="0.5"/>
  <g font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Inter,system-ui,sans-serif">
    <text x="178" y="724" fill="#5EEAD4" font-size="18" opacity="0.92">持久化存储</text>
    <text x="178" y="752" fill="#475569" font-size="14" font-family="ui-monospace,Menlo,monospace">workflow_status &#183; operation_outputs</text>
  </g>

  <g stroke-width="1.5" stroke-dasharray="2 6">
    <line x1="300" y1="392" x2="300" y2="688" stroke="#2DD4BF" stroke-opacity="0.45"/>
    <line x1="500" y1="392" x2="500" y2="688" stroke="#2DD4BF" stroke-opacity="0.45"/>
    <line x1="700" y1="392" x2="700" y2="688" stroke="#2DD4BF" stroke-opacity="0.45"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="300" cy="690" r="4.5" fill="#2DD4BF"/>
    <circle cx="500" cy="690" r="4.5" fill="#2DD4BF"/>
    <circle cx="700" cy="690" r="4.5" fill="#2DD4BF"/>
  </g>

  <path d="M 700 690 Q 845 600 900 404" stroke="#FBBF24" stroke-width="2.4" fill="none" stroke-opacity="0.75" stroke-dasharray="7 7" filter="url(#glow)"/>
  <text x="812" y="560" fill="#FCD34D" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Inter,system-ui,sans-serif" font-size="16" opacity="0.9" transform="rotate(-58 812 560)">重放</text>

  <g filter="url(#glow)">
    <line x1="170" y1="380" x2="700" y2="380" stroke="url(#rail)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="945" y1="380" x2="1430" y2="380" stroke="#818CF8" stroke-width="2.2" stroke-opacity="0.35" stroke-dasharray="9 9"/>
  </g>

  <g filter="url(#glow)">
    <path d="M 812 326 L 872 372 L 838 386 L 896 438" stroke="#FB7185" stroke-width="3.4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- completed steps: rounded squares (distinct from EN circles) -->
  <g filter="url(#glow)">
    <rect x="287" y="367" width="26" height="26" rx="7" fill="#0B1220" stroke="#818CF8" stroke-width="3"/>
    <rect x="294" y="374" width="12" height="12" rx="3" fill="#818CF8"/>
    <rect x="487" y="367" width="26" height="26" rx="7" fill="#0B1220" stroke="#818CF8" stroke-width="3"/>
    <rect x="494" y="374" width="12" height="12" rx="3" fill="#818CF8"/>
    <rect x="687" y="367" width="26" height="26" rx="7" fill="#0B1220" stroke="#818CF8" stroke-width="3"/>
    <rect x="694" y="374" width="12" height="12" rx="3" fill="#818CF8"/>
    <circle cx="900" cy="380" r="15" fill="#1A1407" stroke="#FBBF24" stroke-width="3.5"/>
    <circle cx="900" cy="380" r="6" fill="#FBBF24"/>
    <rect x="1110" y="370" width="20" height="20" rx="6" fill="#0B1220" stroke="#818CF8" stroke-width="2" stroke-opacity="0.45"/>
    <rect x="1330" y="370" width="20" height="20" rx="6" fill="#0B1220" stroke="#818CF8" stroke-width="2" stroke-opacity="0.45"/>
  </g>

  <g font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Inter,system-ui,sans-serif" text-anchor="middle">
    <text x="300" y="440" fill="#94A3B8" font-size="15">已 checkpoint</text>
    <text x="500" y="440" fill="#94A3B8" font-size="15">已 checkpoint</text>
    <text x="700" y="440" fill="#94A3B8" font-size="15">已 checkpoint</text>
    <text x="900" y="442" fill="#FCD34D" font-size="15" font-weight="600">从这里继续</text>
    <text x="1230" y="438" fill="#475569" font-size="15">尚未执行</text>
  </g>
</svg>
