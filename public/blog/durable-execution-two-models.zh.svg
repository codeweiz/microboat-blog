<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 736" role="img" aria-labelledby="t d">
  <title id="t">持久化执行的两种模型</title>
  <desc id="d">确定性重放与按步 checkpoint：崩溃后两边都重跑代码，但存下来的东西不同。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#070C16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C2348"/><stop offset="1" stop-color="#0E1428"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1020"/><stop offset="1" stop-color="#0B1222"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#1E293B" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1320" height="736" fill="url(#bg)"/>
  <rect width="1320" height="736" fill="url(#grid)"/>

  <g font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Inter,system-ui,sans-serif">
    <text x="660" y="52" fill="#F8FAFC" font-size="29" font-weight="700" text-anchor="middle">让程序持久化的两条路</text>
    <line x1="588" y1="68" x2="732" y2="68" stroke="#818CF8" stroke-width="3" stroke-linecap="round"/>
    <text x="660" y="96" fill="#94A3B8" font-size="15" text-anchor="middle">崩溃后两边都从头重跑代码，区别在于把什么写进了持久层。</text>

    <!-- LEFT: 重放派 (indigo) -->
    <g filter="url(#sh)"><rect x="40" y="120" width="586" height="544" rx="16" fill="url(#card)" stroke="#33356B"/></g>
    <g transform="translate(40 120)">
      <rect x="0" y="0" width="586" height="6" rx="3" fill="#818CF8" opacity="0.9"/>
      <rect x="28" y="38" width="14" height="14" rx="4" fill="#818CF8"/>
      <text x="52" y="51" fill="#FFFFFF" font-size="21" font-weight="700">重放派：记录代码的历史</text>
      <text x="28" y="80" fill="#A5B4FC" font-size="13">Temporal &#183; Cadence &#183; Azure Durable Functions</text>
      <line x1="28" y1="98" x2="558" y2="98" stroke="#33356B"/>

      <text x="28" y="130" fill="#CBD5E1" font-size="14" font-weight="600">存的是：一份只追加的事件历史</text>
      <g font-family="ui-monospace,Menlo,monospace">
        <rect x="28" y="142" width="530" height="160" rx="9" fill="url(#inner)" stroke="#818CF8" stroke-opacity="0.25"/>
        <text x="48" y="170" fill="#64748B" font-size="13">event_history &#8212; 权威记录</text>
        <text x="48" y="200" fill="#E2E8F0" font-size="13.5">1  WorkflowStarted(input)</text>
        <text x="48" y="226" fill="#E2E8F0" font-size="13.5">2  ActivityScheduled: charge_card</text>
        <text x="48" y="252" fill="#E2E8F0" font-size="13.5">3  ActivityCompleted: ok</text>
        <text x="48" y="278" fill="#E2E8F0" font-size="13.5">4  TimerStarted: 5m</text>
      </g>

      <text x="28" y="340" fill="#CBD5E1" font-size="14" font-weight="600">重启时</text>
      <text x="28" y="366" fill="#F1F5F9" font-size="14.5">从第 1 行重跑，按顺序把每个记录</text>
      <text x="28" y="388" fill="#F1F5F9" font-size="14.5">下来的结果喂回去，跳过历史里</text>
      <text x="28" y="410" fill="#F1F5F9" font-size="14.5">已有的每个 activity。</text>

      <rect x="28" y="436" width="530" height="80" rx="10" fill="#818CF8" fill-opacity="0.08" stroke="#818CF8" stroke-opacity="0.4"/>
      <text x="48" y="464" fill="#A5B4FC" font-size="13" font-weight="700" letter-spacing="0.5">约 束</text>
      <text x="48" y="489" fill="#F1F5F9" font-size="14">工作流代码必须是确定的：</text>
      <text x="48" y="509" fill="#F1F5F9" font-size="14">不读墙上时钟、不取随机、不直接做 I/O。</text>
    </g>

    <!-- center connector -->
    <g>
      <line x1="660" y1="150" x2="660" y2="636" stroke="#334155" stroke-dasharray="3 6"/>
      <g filter="url(#sh)"><rect x="600" y="368" width="120" height="48" rx="24" fill="#0E1428" stroke="#475569"/></g>
      <text x="660" y="397" fill="#CBD5E1" font-size="13" font-weight="600" text-anchor="middle" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Inter,system-ui,sans-serif">都重跑代码</text>
    </g>

    <!-- RIGHT: checkpoint 派 (teal) -->
    <g filter="url(#sh)"><rect x="694" y="120" width="586" height="544" rx="16" fill="url(#card)" stroke="#134E4A"/></g>
    <g transform="translate(694 120)">
      <rect x="0" y="0" width="586" height="6" rx="3" fill="#2DD4BF" opacity="0.9"/>
      <rect x="28" y="38" width="14" height="14" rx="4" fill="#2DD4BF"/>
      <text x="52" y="51" fill="#FFFFFF" font-size="21" font-weight="700">checkpoint 派：存每步输出</text>
      <text x="28" y="80" fill="#5EEAD4" font-size="13">DBOS Transact &#8212; 一个库，没有编排器</text>
      <line x1="28" y1="98" x2="558" y2="98" stroke="#134E4A"/>

      <text x="28" y="130" fill="#CBD5E1" font-size="14" font-weight="600">存的是：每个已完成步骤一行</text>
      <g font-family="ui-monospace,Menlo,monospace">
        <rect x="28" y="142" width="530" height="160" rx="9" fill="url(#inner)" stroke="#2DD4BF" stroke-opacity="0.22"/>
        <text x="48" y="170" fill="#64748B" font-size="13">operation_outputs in your Postgres</text>
        <text x="48" y="196" fill="#64748B" font-size="12.5">(workflow_uuid, function_id) &#8594; output</text>
        <text x="48" y="226" fill="#E2E8F0" font-size="13.5">(w1, 0)  &#8594;  charge_card: ok</text>
        <text x="48" y="252" fill="#E2E8F0" font-size="13.5">(w1, 1)  &#8594;  send_email: sent</text>
        <text x="48" y="278" fill="#475569" font-size="13.5">(w1, 2)  &#8594;  &#8212;  尚未执行</text>
      </g>

      <text x="28" y="340" fill="#CBD5E1" font-size="14" font-weight="600">重启时</text>
      <text x="28" y="366" fill="#F1F5F9" font-size="14.5">从头重跑；每步之前先查它的</text>
      <text x="28" y="388" fill="#F1F5F9" font-size="14.5">checkpoint，命中就返回存好的输出，</text>
      <text x="28" y="410" fill="#F1F5F9" font-size="14.5">跳过这次副作用。</text>

      <rect x="28" y="436" width="530" height="80" rx="10" fill="#2DD4BF" fill-opacity="0.08" stroke="#2DD4BF" stroke-opacity="0.4"/>
      <text x="48" y="464" fill="#5EEAD4" font-size="13" font-weight="700" letter-spacing="0.5">特 性</text>
      <text x="48" y="489" fill="#F1F5F9" font-size="14">一步的 checkpoint 和它做的业务写，</text>
      <text x="48" y="509" fill="#F1F5F9" font-size="14">能在同一个事务里提交。</text>
    </g>

    <text x="660" y="704" fill="#64748B" font-size="14.5" text-anchor="middle">恢复形状相同，持久记录不同：一段事件流，还是每个完成步骤一行。</text>
  </g>
</svg>
