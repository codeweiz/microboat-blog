<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 600" role="img" aria-labelledby="title desc">
  <title id="title">Tau Scaling Four Layers</title>
  <desc id="desc">Horizontal block diagram showing transistor, circuit, chip, and system layers across time scales from picosecond to second.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0EA5E9" opacity="0.82"/>
    </marker>
    <linearGradient id="boxFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E293B" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.055 0 0 0 0 0.647 0 0 0 0 0.914 0 0 0 0.30 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1320" height="600" fill="#0F172A" opacity="0.18"/>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="660" y="64" fill="#F8FAFC" font-size="32" font-weight="700" text-anchor="middle">Tau Scaling Across Four Layers</text>
    <text x="660" y="94" fill="#BAE6FD" font-size="15" text-anchor="middle" opacity="0.9">Latency reduction compounds from devices to distributed systems</text>

    <g transform="translate(50 145)" filter="url(#softGlow)">
      <g>
        <rect x="0" y="0" width="235" height="230" rx="8" fill="url(#boxFill)" stroke="#0EA5E9" stroke-opacity="0.40"/>
        <text x="22" y="38" fill="#FFFFFF" font-size="21" font-weight="700">Transistor Layer</text>
        <line x1="22" y1="56" x2="213" y2="56" stroke="#0EA5E9" stroke-opacity="0.45"/>
        <text x="22" y="88" fill="#E0F2FE" font-size="15" font-weight="700">Time scale</text>
        <text x="22" y="112" fill="#F8FAFC" font-size="16">~picosecond</text>
        <text x="22" y="146" fill="#E0F2FE" font-size="15" font-weight="700">Example</text>
        <text x="22" y="170" fill="#F8FAFC" font-size="16">RC switching delay</text>
        <text x="22" y="204" fill="#E0F2FE" font-size="15" font-weight="700">Mechanism</text>
        <text x="22" y="228" fill="#F8FAFC" font-size="15">Hybrid bonding shortens wires</text>
      </g>

      <line x1="255" y1="115" x2="307" y2="115" stroke="#0EA5E9" stroke-width="3" marker-end="url(#arrow)"/>

      <g transform="translate(325 0)">
        <rect x="0" y="0" width="235" height="230" rx="8" fill="url(#boxFill)" stroke="#0EA5E9" stroke-opacity="0.40"/>
        <text x="22" y="38" fill="#FFFFFF" font-size="21" font-weight="700">Circuit Layer</text>
        <line x1="22" y1="56" x2="213" y2="56" stroke="#0EA5E9" stroke-opacity="0.45"/>
        <text x="22" y="88" fill="#E0F2FE" font-size="15" font-weight="700">Time scale</text>
        <text x="22" y="112" fill="#F8FAFC" font-size="16">~nanosecond</text>
        <text x="22" y="146" fill="#E0F2FE" font-size="15" font-weight="700">Example</text>
        <text x="22" y="170" fill="#F8FAFC" font-size="15">RC propagation along paths</text>
        <text x="22" y="204" fill="#E0F2FE" font-size="15" font-weight="700">Mechanism</text>
        <text x="22" y="228" fill="#F8FAFC" font-size="15">LogicFolding cuts routing 30%</text>
      </g>

      <line x1="580" y1="115" x2="632" y2="115" stroke="#0EA5E9" stroke-width="3" marker-end="url(#arrow)"/>

      <g transform="translate(650 0)">
        <rect x="0" y="0" width="235" height="230" rx="8" fill="url(#boxFill)" stroke="#0EA5E9" stroke-opacity="0.40"/>
        <text x="22" y="38" fill="#FFFFFF" font-size="21" font-weight="700">Chip Layer</text>
        <line x1="22" y1="56" x2="213" y2="56" stroke="#0EA5E9" stroke-opacity="0.45"/>
        <text x="22" y="88" fill="#E0F2FE" font-size="15" font-weight="700">Time scale</text>
        <text x="22" y="112" fill="#F8FAFC" font-size="16">~microsecond</text>
        <text x="22" y="146" fill="#E0F2FE" font-size="15" font-weight="700">Example</text>
        <text x="22" y="170" fill="#F8FAFC" font-size="15">Compute to memory access</text>
        <text x="22" y="204" fill="#E0F2FE" font-size="15" font-weight="700">Mechanism</text>
        <text x="22" y="228" fill="#F8FAFC" font-size="15">SRAM placement, cache topology</text>
      </g>

      <line x1="905" y1="115" x2="957" y2="115" stroke="#0EA5E9" stroke-width="3" marker-end="url(#arrow)"/>

      <g transform="translate(975 0)">
        <rect x="0" y="0" width="235" height="230" rx="8" fill="url(#boxFill)" stroke="#0EA5E9" stroke-opacity="0.40"/>
        <text x="22" y="38" fill="#FFFFFF" font-size="21" font-weight="700">System Layer</text>
        <line x1="22" y1="56" x2="213" y2="56" stroke="#0EA5E9" stroke-opacity="0.45"/>
        <text x="22" y="88" fill="#E0F2FE" font-size="15" font-weight="700">Time scale</text>
        <text x="22" y="112" fill="#F8FAFC" font-size="16">~millisecond-second</text>
        <text x="22" y="146" fill="#E0F2FE" font-size="15" font-weight="700">Example</text>
        <text x="22" y="170" fill="#F8FAFC" font-size="15">End-to-end message passing</text>
        <text x="22" y="204" fill="#E0F2FE" font-size="15" font-weight="700">Mechanism</text>
        <text x="22" y="228" fill="#F8FAFC" font-size="15">Unified Bus, collective ops</text>
      </g>
    </g>

    <g transform="translate(210 475)">
      <line x1="0" y1="0" x2="900" y2="0" stroke="#0EA5E9" stroke-width="1.5" stroke-opacity="0.80"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#0EA5E9" stroke-width="1.5"/>
      <line x1="900" y1="-8" x2="900" y2="8" stroke="#0EA5E9" stroke-width="1.5"/>
      <text x="0" y="34" fill="#E0F2FE" font-size="16" text-anchor="middle">picosecond</text>
      <text x="900" y="34" fill="#E0F2FE" font-size="16" text-anchor="middle">second</text>
      <text x="450" y="-18" fill="#FFFFFF" font-size="18" font-weight="700" text-anchor="middle">12 orders of magnitude</text>
    </g>
  </g>
</svg>
